<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CC Buddy</title>
<link rel="stylesheet" href="/src/style.css"/>
</head>
<body>
<div id="app">
  <div id="playground"></div>
  <div id="bars">
    <div class="bar-row">
      <span class="bar-label">5h</span>
      <div class="bar-track"><div class="bar-fill" id="bar5h"></div></div>
      <span class="bar-pct" id="pct5h">0%</span>
    </div>
    <div class="bar-row">
      <span class="bar-label">Week</span>
      <div class="bar-track"><div class="bar-fill" id="barWeek"></div></div>
      <span class="bar-pct" id="pctWeek">0%</span>
    </div>
  </div>
</div>
<script type="module" src="/src/main.js"></script>
</body>
</html>
